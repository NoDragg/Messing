spring.application.name=Messing
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
# Load biến từ file .env (key=value) nếu file tồn tại
spring.config.import=optional:file:.env[.properties]

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Upload configuration
app.upload-dir=${APP_UPLOAD_DIR:uploads}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
app.avatar-size=${APP_AVATAR_SIZE:256}

# Multipart limits (expanded)
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:25MB}

# Livekit configuration
livekit.url=${LIVEKIT_URL}
livekit.api-key=${LIVEKIT_API_KEY}
livekit.api-secret=${LIVEKIT_API_SECRET}

# Bot AI provider configuration
app.bot.api-key=${BOT_API_KEY:}
app.bot.base-url=${BOT_BASE_URL:}
app.bot.model=${BOT_MODEL:}
app.bot.timeout-ms=${BOT_TIMEOUT_MS:60000}
app.bot.recent-message-limit=${BOT_RECENT_MESSAGE_LIMIT:10}
app.bot.system-prompt=${BOT_SYSTEM_PROMPT:Bạn là Bot hỗ trợ chat trong channel. Trả lời ngắn gọn, rõ ràng, đúng trọng tâm. Nếu không đủ dữ liệu, hãy nói rõ là chưa đủ thông tin. Chỉ trả lời bằng tiếng Việt.}
