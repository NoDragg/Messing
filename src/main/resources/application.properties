spring.application.name=Messing
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
# Load biến từ file .env (key=value) nếu file tồn tại
spring.config.import=optional:file:.env[.properties]

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Upload configuration
app.upload-dir=${APP_UPLOAD_DIR:uploads}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
app.avatar-size=${APP_AVATAR_SIZE:256}

# Multipart limits (expanded)
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:25MB}
